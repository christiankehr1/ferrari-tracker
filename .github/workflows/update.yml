name: Crawl and publish

on:
  schedule:
    # Hourly at :17 — off the top of the hour, where GitHub's scheduler is
    # busiest and runs get delayed the most.
    - cron: "17 * * * *"
  workflow_dispatch: # manual "Run workflow" button
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/update.yml"]

# Never let two crawls write data at the same time.
concurrency:
  group: crawl-and-publish
  cancel-in-progress: false

permissions:
  contents: write # commit data/
  pages: write # deploy site
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Crawl AutoScout24
        run: python crawler/crawl.py

      - name: Commit data
        run: |
          git config user.name "ferrari-tracker"
          git config user.email "actions@github.com"
          git add data/
          # No changes is the normal case — prices rarely move. Don't fail.
          git diff --staged --quiet || git commit -m "data: crawl $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build site
        working-directory: web
        run: |
          npm ci
          npm run build
          # Ship the fresh data alongside the built site.
          mkdir -p dist/data
          cp ../data/dashboard.json dist/data/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - id: deploy
        uses: actions/deploy-pages@v4
